name: Keep Backend Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          curl -fsS --max-time 30 https://bitirmeprojesi-gza2.onrender.com/health || \
          curl -fsS --max-time 30 https://bitirmeprojesi-gza2.onrender.com/ || true
          echo "Ping sent at $(date)"
